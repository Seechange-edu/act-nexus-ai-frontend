name: Build and Push Docker Image

on:
  release:
    types: [published]

jobs:
  action_trigger:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false

    steps:
      - name: get tag info
        uses: Seechange-edu/Parse-Action-Tag@main
        with:
          githubToken: ${{ secrets.ACTION_TOKEN }}
          type: parse

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: SeeChange-edu/${{ env.REPOSITORY }}
          token: ${{ secrets.ACTION_TOKEN }}
          ref: ${{ env.BRANCH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Setup AWS ECR Details (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            role-session-name: GitHubActions-ECR-Push
            aws-region: ${{ vars.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-pf-aws-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.login-pf-aws-ecr.outputs.registry }}/${{ vars.APP_ID }}/${{ env.ACTIVE }}:frontend-${{ env.ACTIVE }}
          build-args: BUILD_ENV=${{ env.ACTIVE }}
          cache-from: type=registry,ref=${{ steps.login-pf-aws-ecr.outputs.registry }}/${{ vars.APP_ID }}/${{ env.ACTIVE }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-pf-aws-ecr.outputs.registry }}/${{ vars.APP_ID }}/${{ env.ACTIVE }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Get ECR login token
        id: ecr-login-token
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ vars.AWS_REGION }})
          echo "token<<EOF" >> $GITHUB_OUTPUT
          echo "$ECR_TOKEN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: SSH and deploy frontend
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_URI: ${{ steps.login-pf-aws-ecr.outputs.registry }}/${{ vars.APP_ID }}/${{ env.ACTIVE }}:frontend-${{ env.ACTIVE }}
          ECR_TOKEN: ${{ steps.ecr-login-token.outputs.token }}
          ECR_REGISTRY: ${{ steps.login-pf-aws-ecr.outputs.registry }}
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ env.REMOTE_SSH_KEY }}
          envs: IMAGE_URI,ECR_TOKEN,ECR_REGISTRY
          script: |
            # Login to AWS ECR using temporary token from GitHub Actions
            echo ${ECR_TOKEN} | docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Free disk space before pull (avoid "no space left on device")
            if [ "$(docker ps -a -q -f name=nexus-ai-frontend-${{ env.ACTIVE }})" ]; then
              echo "Stopping and removing existing nexus-ai-frontend-${{ env.ACTIVE }} container..."
              docker stop nexus-ai-frontend-${{ env.ACTIVE }} || true
              docker rm -f nexus-ai-frontend-${{ env.ACTIVE }} || true
            fi
            echo "Pruning unused Docker resources to free space..."
            docker container prune -f || true
            docker image prune -af || true
            docker system prune -af --volumes || true
            
            # Pull latest frontend image
            docker pull $IMAGE_URI

            echo "Starting frontend container..."
            docker run -d \
              --name nexus-ai-frontend-${{ env.ACTIVE }} \
              -p ${{ env.OUT_PORT }}:${{ env.PORT }} \
              --restart unless-stopped \
              $IMAGE_URI
            
            # Clean up unused images
            docker image prune --force
            docker container prune --force

  notify-teams:
    if: always()
    needs: [ action_trigger ]
    runs-on: ubuntu-latest
    steps:
      - name: Send Teams Notification
        env:
          WEBHOOK: ${{ vars.DEV_TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "${{ needs.action_trigger.result == 'success' && '00FF00' || 'FF0000' }}",
            "summary": "${{ needs.action_trigger.result == 'success' && '🎉 Build succeeded!' || '❌ Build failed!' }}",
            "title": "${{ needs.action_trigger.result == 'success' && '🎉 Build succeeded!' || '❌ Build failed!' }}: ${{ github.repository }}: ${{ github.workflow }}",
            "sections": [{
              "facts": [
                { "name": "Repository", "value": "${{ github.repository }}" },
                { "name": "Triggered by", "value": "${{ github.event_name }}" },
                { "name": "Commit Message", "value": "${{ github.event.head_commit.message }}" },
                { "name": "Author", "value": "@${{ github.actor }}" },
                { "name": "Result", "value": "${{ needs.action_trigger.result }}" }
              ],
              "text": "[View Workflow Run](${{ env.RUN_URL }})"
            }]
          }' \
          "$WEBHOOK"